<div class="card card-style-1">
    <img src="{{ .Params.image }}" alt="Card Image" class="card-img">
    <div class="card-content">
      <h3 class="card-title">{{ .Params.title }}</h3>
      <p class="card-text">{{ .Params.description }}</p>
      <a href="{{ .Params.url }}" class="btn btn-primary">Learn More</a>
    </div>
  </div>
